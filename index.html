    function saveToStorage() {
      localStorage.setItem('examState', JSON.stringify({
        studentName: currentState.studentName,
        studentClass: currentState.studentClass,
        answers: currentState.answers,
        doubtful: Array.from(currentState.doubtful),
        timeLeft: currentState.timeLeft,
        violations: currentState.violations
      }));
    }

    function loadFromStorage() {
      const saved = localStorage.getItem('examState');
      if (saved) {
        const data = JSON.parse(saved);
        currentState.studentName = data.studentName || '';
        currentState.studentClass = data.studentClass || '';
        currentState.answers = data.answers || {};
        currentState.doubtful = new Set(data.doubtful || []);
        currentState.timeLeft = data.timeLeft || DURATION_MINUTES * 60;
        currentState.violations = data.violations || 0;
      }
    }

    function clearStorage() {
      localStorage.removeItem('examState');
    }

    function hasOngoingExam() {
      const saved = localStorage.getItem('examState');
      if (!saved) return false;
      
      try {
        const data = JSON.parse(saved);
        return data.studentName && data.studentClass && data.timeLeft > 0;
      } catch {
        return false;
      }
    }

    function hasCompletedExam(name, className) {
      return examResults.some(result => 
        result.student_name === name && result.student_class === className
      );
    }

    window.continueExam = () => {
      loadFromStorage();
      currentState.page = 'exam';
      startTimer();
      render();
    };

    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function startTimer() {
      if (currentState.timerInterval) clearInterval(currentState.timerInterval);
      
      currentState.timerInterval = setInterval(() => {
        currentState.timeLeft--;
        saveToStorage();
        
        const timerEl = document.getElementById('timer');
        if (timerEl) {
          timerEl.textContent = formatTime(currentState.timeLeft);
          
          if (currentState.timeLeft <= 300) {
            timerEl.classList.add('text-red-600', 'font-bold');
          }
        }
        
        if (currentState.timeLeft <= 0) {
          clearInterval(currentState.timerInterval);
          submitExam();
        }
        
        render();
      }, 1000);
    }

    function stopTimer() {
      if (currentState.timerInterval) {
        clearInterval(currentState.timerInterval);
        currentState.timerInterval = null;
      }
    }

    function showWarning() {
      currentState.violations++;
      currentState.warningCountdown = WARNING_COUNTDOWN;
      saveToStorage();
      
      if (currentState.violations >= MAX_VIOLATIONS) {
        submitExam();
        return;
      }
      
      currentState.page = 'warning';
      render();
      
      if (currentState.warningInterval) clearInterval(currentState.warningInterval);
      
      currentState.warningInterval = setInterval(() => {
        currentState.warningCountdown--;
        
        const countdownEl = document.getElementById('warningCountdown');
        if (countdownEl) {
          countdownEl.textContent = currentState.warningCountdown;
        }
        
        if (currentState.warningCountdown <= 0) {
          clearInterval(currentState.warningInterval);
          submitExam();
        }
      }, 1000);
      
      if (currentState.warningTimeout) clearTimeout(currentState.warningTimeout);
      
      currentState.warningTimeout = setTimeout(() => {
        submitExam();
      }, WARNING_COUNTDOWN * 1000);
    }

    function returnToExam() {
      if (currentState.warningTimeout) clearTimeout(currentState.warningTimeout);
      if (currentState.warningInterval) clearInterval(currentState.warningInterval);
      
      currentState.page = 'exam';
      render();
    }

    function setupAntiCheat() {
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && currentState.page === 'exam') {
          stopTimer();
          showWarning();
        }
      });
      
      window.addEventListener('blur', () => {
        if (currentState.page === 'exam') {
          stopTimer();
          showWarning();
        }
      });
      
      window.addEventListener('focus', () => {
        if (currentState.page === 'exam' && currentState.timerInterval === null) {
          startTimer();
        }
      });
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && e.key === 'I') || 
            (e.ctrlKey && e.shiftKey && e.key === 'J') || 
            (e.ctrlKey && e.key === 'U')) {
          e.preventDefault();
          return false;
        }
      });
      
      document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
      });
    }

    async function submitExam() {
      stopTimer();
      if (currentState.warningTimeout) clearTimeout(currentState.warningTimeout);
      if (currentState.warningInterval) clearInterval(currentState.warningInterval);
      
      currentState.isSaving = true;
      
      const config = window.elementSdk?.config || defaultConfig;
      const score = calculateScore();
      const answered = Object.keys(currentState.answers).length;
      const correct = Math.round((score / 100) * questions.length);
      const timeTaken = DURATION_MINUTES * 60 - currentState.timeLeft;
      
      const resultData = {
        student_name: currentState.studentName,
        student_class: currentState.studentClass,
        exam_title: config.exam_title,
        score: parseFloat(score.toFixed(2)),
        correct_answers: correct,
        total_questions: questions.length,
        answered: answered,
        violations: currentState.violations,
        submitted_at: new Date().toISOString(),
        answers: JSON.stringify(currentState.answers),
        time_taken: timeTaken
      };
      
      if (window.dataSdk) {
        const result = await window.dataSdk.create(resultData);
        if (result.isError) {
          console.error('Error saving exam result:', result.error);
        }
      }
      
      currentState.isSaving = false;
      currentState.page = 'result';
      render();
    }

    function calculateScore() {
      let correct = 0;
      questions.forEach((q, index) => {
        const answer = currentState.answers[index];
        if (answer === q.answer) {
          correct++;
        }
      });
      return (correct / questions.length) * 100;
    }

    function getAnswerStatus(index) {
      if (currentState.doubtful.has(index)) return 'doubtful';
      if (currentState.answers[index]) return 'answered';
      return 'unanswered';
    }

      const passCount = examResults.filter(r => r.score >= 70).length;
      const passPercentage = totalResults > 0 ? ((passCount / totalResults) * 100).toFixed(1) : 0;
      
      // Sort by score descending
      const sortedResults = [...examResults].sort((a, b) => b.score - a.score);

      currentState.currentQuestion = index;
      render();

      currentState.answers[currentState.currentQuestion] = letter;
      saveToStorage();
      render();
    };

    window.toggleDoubtful = () => {
      if (currentState.doubtful.has(currentState.currentQuestion)) {
        currentState.doubtful.delete(currentState.currentQuestion);
      } else {
        currentState.doubtful.add(currentState.currentQuestion);
      }
      saveToStorage();
      render();
    };

    window.previousQuestion = () => {
      if (currentState.currentQuestion > 0) {
        currentState.currentQuestion--;
        render();
      }
    };

    window.nextQuestion = () => {
      if (currentState.currentQuestion < questions.length - 1) {
        currentState.currentQuestion++;
        render();
      }
    };

    window.confirmSubmit = () => {
      const answered = Object.keys(currentState.answers).length;
      const unanswered = questions.length - answered;
      
      if (unanswered > 0) {
        const confirmDiv = document.createElement('div');
        confirmDiv.className = 'fixed inset-0 flex items-center justify-center z-50';
        confirmDiv.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
        
        const config = window.elementSdk?.config || defaultConfig;
        
        confirmDiv.innerHTML = `

    window.exportResultsToCSV = () => {
      if (examResults.length === 0) {
        alert('Tidak ada data untuk diexport');
        return;
      }
      
      // Create CSV header
      const headers = ['No.', 'Nama Peserta', 'Kelas', 'Nilai', 'Benar', 'Total', 'Status', 'Pelanggaran', 'Waktu Selesai'];
      const rows = [];
      
      // Add data rows
      examResults.sort((a, b) => b.score - a.score).forEach((result, index) => {
        const status = result.score >= 70 ? 'LULUS' : 'TIDAK LULUS';
        const formatDate = (isoString) => {
          const date = new Date(isoString);
          return date.toLocaleDateString('id-ID', { 
            year: 'numeric', 
            month: '2-digit', 
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
          }).replace(/\//g, '-');
        };
        
        rows.push([
          index + 1,
          `"${result.student_name}"`,
          `"${result.student_class}"`,
          result.score.toFixed(1),
          result.correct_answers,
          result.total_questions,
          status,
          result.violations || 0,
          `"${formatDate(result.submitted_at)}"`
        ]);
      });
      
      // Create CSV content
      const csvContent = [
        headers.join(','),
        ...rows.map(row => row.join(','))
      ].join('\n');
      
      // Download CSV
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      
      const config = window.elementSdk?.config || defaultConfig;
      const filename = `Rekap_Nilai_${config.exam_title.replace(/\s+/g, '_')}_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.csv`;
      
      link.setAttribute('href', url);
      link.setAttribute('download', filename);
      link.style.visibility = 'hidden';
      
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };
